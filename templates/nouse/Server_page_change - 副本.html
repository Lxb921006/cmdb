<script type="text/javascript">
    $(function () {
        $(document).on('mouseenter','td',function () {
            $(this).css('background-color','#f1f1f1');
            $(this).siblings('td').css('background-color','#f1f1f1');
        });
        $(document).on('mouseleave','td',function(){
            $(this).css('background-color','white');
            $(this).siblings('td').css('background-color','white');
        });

        $("#select_all").click(function(){
            console.log($(this).prop("checked"));
            if($(this).prop("checked")){
                $("input[type='checkbox']").prop("checked",true);
            }else{
                $("input[type='checkbox']").prop("checked",false);
            }
        });

        $("#flush_page").click(function () {
             location.reload(true);
        });

        $("#tag_add_data_click").click(function () {
            $('iframe').attr('src','add_data.html');
            $('.title_name_close').html('添加服务器');
            $("#jump_content").show(20);
            $('.tag_content_shade').show(20);
        });

        $('.tag_button').click(function () {
            $('iframe').attr('src','edit_td_data.html');
            $('.title_name_close').html('编辑');
            $("#jump_content").show(20);
            $('.tag_content_shade').show(20)
        });

         $(".title_name_close_01").click(function () {
            $("#jump_content").hide(30);
            $('.tag_content_shade').hide(30)
        });

         $("#del_selected").click(function () {
             if ($("input[type='checkbox']:checked").length <= 0){
                alert("都没勾选啊,兄弟!");
                return false;
            }
             if(confirm("确定都删除吗?")){
                 alert('删除成功');
             }
         });

         $("#del_one_data").click(function () {
             if(confirm("确定删除吗?")){
                 alert('删除成功');
             }
         });

        $(".title_name_close_all").mousedown(function (e) {
            console.log('sdf');
            //设置移动后的默认位置
            var endx = 0;
            var endy = 0;
            //获取div的初始位置，要注意的是需要转整型，因为获取到值带px
            var left = parseInt($("#jump_content").css("left"));
            var top = parseInt($("#jump_content").css("top"));

            //获取鼠标按下时的坐标，区别于下面的es.pageX,es.pageY
            var downx = e.pageX;
            var downy = e.pageY; //pageY的y要大写，必须大写！！

            // 鼠标按下时给div挂事件
            e.preventDefault();//
            $(document).bind("mousemove", function (es) {
            //es.pageX,es.pageY:获取鼠标移动后的坐标
            var body_h = $('body').height();
            var body_w = $('body').width();
            var div_h = $('#jump_content').height();
            var div_w = $('#jump_content').width();
            var endx = es.pageX - downx + left; //计算div的最终位置
            var endy = es.pageY - downy + top;
            //带上单位
            if(endx >= -1 && endx < body_w - div_w){
                if(endy >= -1 && endy <= body_h - div_h){
                    $("#jump_content").css("left", endx + "px").css("top", endy + "px");
                }
            }
            });
            $(document).mouseup(function () {
                //鼠标弹起时给div取消事件
                $(this).unbind("mousemove")
            })
        });
    });
</script>
