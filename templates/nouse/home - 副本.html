<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>主页</title>
    <style>
        html{
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }
        *{
            margin: 0;
            padding: 0;
        }
        body{
            width: 100%;
            min-height: 100%;
            background: #f1f1f1;
        }
        .tag_all_show{
            padding: 10px;
        }
        .tag_all_show>*{
            margin-bottom: 14px;
        }
        .tag_pub_info{
            position: relative;
            padding: 10px 15px;
            line-height: 50px;
            width: 100%;
            border-radius: 2px;
            box-sizing: border-box;
            background: #fff;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,.05);
        }
        .tag_content{
            padding: 16px;
            line-height: 25px;
            border-left: 5px solid #009688;
            border-radius: 0 2px 2px 0;
            background-color: #f2f2f2;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="tag_all_show">
        <div class="tag_pub_info">
            <div class="tag_content">
                欢迎{{ login_user }}!
                <span id="severTime"></span>
            </div>
        </div>
        <div class="tag_pub_info">
            <div class="table_machines">
                浏览器弹窗提示一定要启用，否则会出大事!!!
            </div>
        </div>
    </div>
</body>
<script src="/static/js/jquery-1.11.1/jquery.min.js"></script>
<script type="text/javascript">
    $(function () {
        var t = null;
        t = setTimeout(time, 1000);//開始运行
        function time() {
            clearTimeout(t);//清除定时器
            dt = new Date();
            var year = dt.getFullYear();
            var month = dt.getMonth() + 1;//(0-11,0代表1月)
            var date = dt.getDate();//获取天
            var num = dt.getDay();//获取星期
            var weekday = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
            var hour = dt.getHours();//获取时
            var minute = dt.getMinutes();//获取分
            var second = dt.getSeconds();//获取秒
            //分秒时间是一位数字，在数字前补0。
            date = extra(date);
            month = extra(month);
            minute = extra(minute);
            second = extra(second);
            document.getElementById("severTime").innerHTML = year + " 年 " + month + " 月 " + date + " 日 " + hour + "：" + minute + "：" + second + " " + weekday[num];
            t = setTimeout(time, 1000); //设定定时器，循环运行
        }

    });
//补位函数。
    function extra(x) {
        //如果传入数字小于10，数字前补一位0。
        if (x < 10) {
            return "0" + x;
        }
        else {
            return x;
        }
    }
</script>
</html>
