<script src="../../static/js/jquery-1.11.1/jquery.min.js"></script>
<script type="text/javascript">
    $(function(){
        resizeLayout();
        $(window).resize(function(){
        resizeLayout();
        });
    });

    function resizeLayout(){
        var hei=$(window).height() - 78;
        $(".menu-look").css("height",hei)
    }

    $(function () {
        $('.show_hide').click(function(){
            $(this).siblings('ul').toggle();
            var $_dir = $(this).find('i').eq(1),
                dir = $_dir.attr('data-dir');
            if(dir && dir=='down') $_dir.html("&#xe603;").attr('data-dir','left');
            else $_dir.html("&#xe61a;").attr('data-dir','down');
        });

        $('#login_name').hover(function () {
            $("#user_info").stop().animate({
                height:'toggle',
            });
            $(this).toggleClass('add_hove');
        });
        $('.menu_name').click(function () {
            var name = $(this).text();
            var exist_item = new Array();
            $('.children_menu').each(function () {
                exist_item.push($(this).attr('id'));
            });
            var res = $.inArray(name, exist_item);
            if (res < 0) {
                var href = ($(this).attr('href')).replace(/.html/g,''),Li_tag = "<li id=" + name + " class='children_menu' style='background:#fff;' target='"+href+"'>" + name + "<i class='layui-icon layui-tag_close' style='line-height:14px;width:13px;top: 10px;font-size: 12px;position:relative;float: right;right: -6px'>&#x1006;</i>" + "</li>";
                $('.two_level_title').find('li').css('background', '#EFEEF0');
                $('.two_level_title').append(Li_tag);
                $('.children_menu').click(function () {
                    $(this).css('background','#fff').siblings().css('background','#EFEEF0');
                    var win_name = $(this).attr('target');
                    $('.x-iframe').attr('src',win_name + '.html');
                })
            }
            else{
                return false;
            }
        });
        $(document).on('click','.layui-tag_close',function () {
            var next_tag = $(this).parent().next().length;
            if (next_tag>0){
                $(this).parent().next().css('background','#fff').siblings().css('background','#EFEEF0');
                var win_name = $(this).parent().next().attr('target');
                $('.x-iframe').attr('src',win_name + '.html');
                $(this).parent().remove();
            }
            else {
                var last_tag = $(this).parent().prev().length;
                if (last_tag>0){
                    $(this).parent().prev().css('background','#fff').siblings().css('background','#EFEEF0');
                    var win_name = $(this).parent().prev().attr('target');
                    $('.x-iframe').attr('src',win_name + '.html');
                    $(this).parent().remove();
                }
            }
        });
    })

</script>
