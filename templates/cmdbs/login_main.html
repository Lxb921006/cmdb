<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>运维平台登录</title>
    <link rel="stylesheet" href="/static/css/layui-v2.5.4/layui/css/layui.css">
    <link rel="stylesheet" href="/static/css/jquery-ui.css">
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        html{
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }
        body{
            width: 100%;
            min-height: 100%;
            background: #353b58;
        }
        .tag-location{
            padding: 3em 0;
        }
        @media (min-width: 1200px){
        .tag-sub-location{
            width: 1170px;
            margin: 0 auto;
        }
            }
        @media (min-width: 1170px){
            .tag-float-size{
            margin-left: 25%;
        }
        }
        @media (min-width: 500px){
        .tag-child-content{
            position: relative;
            width: 50%;
            height: 414px;
            margin: 0 auto;
            border-radius: 13px;
            background-color: #fff;
            white-space: nowrap;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,.05);
        }
        }
        .tag-login-title{
            text-align: center;
            font-size: 37px;
            padding: 20px 1px;
            color: #323640 !important
        }
        .tag-login-info i{
            position: relative;
            left: 31px;
        }
        .tag-login-info input{
            height: 41px;
            box-sizing: border-box;
            width: 100%;
            border-radius: 28px;
            border: none;
            background-color: #f0f0e9;
            padding: 0 20px 0 45px;
            outline:none;
        }
        .tag-login-info input:hover{
            background-color: #edf0d7;
        }
        .tag-info-top{
            margin-top: 43px;
        }
        .tag-login-action button{
            height: 38px;
            line-height: 38px;
            width: 107px;
            font-size: 14px;
            color: #fff;
            text-align: center;
            border: none;
            cursor: pointer;
            border-radius: 19px;
            white-space: nowrap;
            background-color: #0aaaef;
        }
        .tag-public-right button{
            float: right;
            margin-right: -14px;
        }
        .tag-login-action button:hover{
            background-color: #0bc7ef;
        }
        .tag-login{
            position: relative;
            padding: 14px 38px;
            margin-right: 28px;
        }
        .layui-color{
            color: gray
        }

    </style>
</head>
<body>
    <div class="tag-location">
        <div class="tag-sub-location ">
            <div class="tag-child-content tag-float-size">
                <form action="" method="post" class="tag-row">
                    <div class="tag-login-title">
                        <strong>运维平台</strong>
                    </div>
                    <div class="tag-login-info tag-info-top tag-login">
                        <i class="layui-icon layui-color">&#xe66f;</i>
                        <input type="text" id="username" name="username" placeholder="用户名">
                    </div>
                    <div class="tag-login-info tag-login tag-login">
                        <i class="layui-icon layui-color">&#xe673;</i>
                        <input type="password" id="passwd" name="passwd" placeholder="密码">
                    </div>
                    <div class="tag-login-action tag-public-right tag-login">
                        <button type="submit" id="submit">登录</button>
                        <span style="color: #843534">{{ error }}</span>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
<script src="/static/js/jquery-1.11.1/jquery.min.js"></script>
<script src="/static/js/jquery-1.11.1/jquery-ui-min.js"></script>
</html>
