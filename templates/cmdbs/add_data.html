<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        html{
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }
        body{
            width: 100%;
            min-height: 100%;
            background: #f1f1f1;
        }
        .tag_content{
            position: relative;
            padding: 5px;
            margin: 0 auto;
        }
         .tag_select{
            border-radius: 3px;
            margin: 5px;
            height: 26px;
            width: 189px;
            border-width: 1px;
            border-style: solid;
            border-color: #e6e6e6;
            padding: 0 48px;
        }
        .tag_body input{
            border-radius: 3px;
            margin: 5px;
            height: 26px;
            width: 189px;
            border-width: 1px;
            border-style: solid;
            border-color: #e6e6e6;
            text-align: center;
        }
        .tag_body button{
            border-radius: 3px;
            margin: 22px 73px;
            padding: 0 0;
            height: 28px;
            width: 65px;
            background-color: #009688;
            color: #fff;
            white-space: nowrap;
            text-align: center;
            cursor: pointer;
            border: none;
            font-size: 12px;
        }
        .tag_body button:hover{
            background-color: #54968a;
        }
        .tag_body{
            height: 392px;
            padding: 21px 35px;
            background: #f1f1f1;
        }
        .tag_content{
            margin-bottom: 2px;
            margin-left: 13px;
        }
        .tag_info{
            position: relative;
            font-size: 12px;
            margin: 0 0;
        }
        .tag_user_input{
            display: inline-block;
            padding: 0 16px;
        }
        .tag_passwd{
            margin: 0 3px;
        }
        .tag_red{
            color: red;
        }
        .tag_passwd{
            margin-left: 14px;
        }
    </style>
</head>
<body>
     <div class="tag_content">
        <div class="tag_body">
            <div class="tag_content">
                <label class="tag_info">
                    <span class="tag_red">*</span>project
                </label>
                <div class="tag_user_input">
                    <label>
                        <select class="tag_select">
                        {% for i in all_platform %}
                            <option name="project" value="{{ i.project }}">{{ i.project }}</option>
                        {% endfor %}
                        </select>
                    </label>
                </div>
            </div>
            <div class="tag_content">
                <label class="tag_info">
                    <span class="tag_red">*</span>ip
                </label>
                <div class="tag_user_input" style="padding: 0 46px">
                    <input type="text" name="ip">
                </div>
            </div>
            <div class="tag_content">
                <label class="tag_info">
                    <span class="tag_red">*</span>ram
                </label>
                <div class="tag_user_input" style="padding: 0 35px">
                    <input type="number" name="ram">
                </div>
            </div>
            <div class="tag_content">
                <label class="tag_info">
                    <span class="tag_red">*</span>cpu
                </label>
                <div class="tag_user_input" style="padding: 0 37px">
                    <input type="number" name="cpu">
                </div>
            </div>
            <div class="tag_content tag_passwd">
                <label class="tag_info">
                    <span class="tag_red">*</span>disk
                </label>
                <div class="tag_user_input" style="padding: 0 33px">
                    <input type="number" name="disk">
                </div>
            </div>
             <div class="tag_content tag_passwd">
                <label class="tag_info">
                    <span class="tag_red">*</span>os
                </label>
                <div class="tag_user_input" style="padding: 0 43px">
                    <input type="text" name="os">
                </div>
            </div>
            <div class="tag_content tag_passwd">
                <button type="button" id="add_server">添加</button>
            </div>
        </div>
    </div>
</body>
<script src="/static/js/jquery-1.11.1/jquery.min.js"></script>
<script type="text/javascript">
    /*添加服务器*/
    $(function(){
        $("#add_server").click(function(){
            add_servers()
        });
        $($("input[name='os']")).keypress(function (e) {
            if(e.which == "13")
                if($(this).val()){
                    add_servers()
                }
                else{
                    alert('都要填上哦.');
                }
        });
    });
    function add_servers() {
        var data_list = new Array();
        data_list.push( $("option[name='project']:selected").val());
        $("input").each(function () {
            if ($(this).val()) {
                data_list.push($(this).val());
            }
        });
        if(data_list.length!=6){
            alert('都填上哟.');
            return false;
        }
        else {
            $.ajax({
            url:'/cmdb/create_servers/',
            type:'post',
            data:{'data': JSON.stringify(data_list)},
            error: function () {
                console.log('add server fail.');
            },
            success: function (res) {
                alert(res['status']);
            }
            })
        }
    }
</script>
</html>
