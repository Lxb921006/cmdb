<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>用户添加</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        html{
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }
        body{
            width: 100%;
            min-height: 100%;
            background: #f1f1f1;
        }
        .tag_content{
            position: relative;
            padding: 12px;
            margin: 0 auto;
        }
        .tag_body input{
            border-radius: 3px;
            margin: 5px;
            height: 26px;
            width: 189px;
            border-width: 1px;
            border-style: solid;
            border-color: #e6e6e6;
            text-align: center;
        }
        .tag_body select{
            border-radius: 3px;
            margin: 5px;
            height: 26px;
            width: 189px;
            border-width: 1px;
            border-style: solid;
            border-color: #e6e6e6;
            text-align: center;
        }
        .tag_body button{
            border-radius: 3px;
            margin: 0 67px;
            height: 28px;
            width: 65px;
            background-color: #009688;
            color: #fff;
            white-space: nowrap;
            text-align: center;
            cursor: pointer;
            border: none;
            font-size: 12px;
        }
        .tag_body button:hover{
            background-color: #54968a;
        }
        .tag_body{
            height: 376px;
            width: auto;
            padding: 41px 86px;
            background: #f1f1f1;
        }
        .tag_content{
            margin-bottom: 4px;
            margin-left: 13px;
        }
        .tag_info{
            position: relative;
            font-size: 12px;
            margin: 0 51px;
        }
        .tag_user_input{
            display: inline-block;
            padding: 0 5px;
            font-size: 12px;
        }
        .tag_passwd{
            margin: 0 3px;
        }
        .tag_red{
            color: red;
        }
        .tag_passwd{
            margin-left: -11px;
        }
    </style>
</head>
<body>
     <div class="tag_content">
        <div class="tag_body">
            <div class="tag_content">
                <label class="tag_info">
                    <span class="tag_red">*</span>用户:
                </label>
                <div class="tag_user_input" id="username"></div>
            </div>
            <div class="tag_content tag_passwd">
                <label class="tag_info">
                    <span class="tag_red">*</span>用户类型:
                </label>
                <div class="tag_user_input" id="groups"></div>
            </div>
            <div class="tag_content">
                <label class="tag_info">
                    <span class="tag_red">*</span>邮箱:
                </label>
                <div class="tag_user_input" id="email"></div>
            </div>
            <div class="tag_content tag_passwd">
                <label class="tag_info">
                    <span class="tag_red">*</span>账号状态:
                </label>
                <div class="tag_user_input" id="status"></div>
            </div>
            <div class="tag_content tag_passwd">
                <label class="tag_info">
                    <span class="tag_red">*</span>创建时间:
                </label>
                <div class="tag_user_input" id="times"></div>
            </div>
        </div>
    </div>
</body>
<script src="/static/js/jquery-1.11.1/jquery.min.js"></script>
<script type="text/javascript">
    /*用户的公共函数*/
    $(function() {
        var value = location.search;
        value = value.substr(1).split('=');
        $.ajax({
            url:'/cmdb/userinfo/',
            type:'post',
            data:{'user': value[1]},
            error:function(){
                console.log('failed.')
            },
            success:function (res) {
                if(res['msg']['status']=='success'){
                    $("#username").empty().html(value[1]);
                    $("#email").empty().html(res['data']['email']);
                    $("#groups").empty().html(res['data']['user_type']);
                    $("#status").empty().html(res['data']['is_active']);
                    $("#times").empty().html(res['data']['date_joined']);
                }
            }
        })
    })



</script>
</html>
