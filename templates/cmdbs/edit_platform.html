<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        html{
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }
        body{
            width: 100%;
            min-height: 100%;
            background: #f1f1f1;
        }
        .tag_content{
            position: relative;
            padding: 5px;
            margin: 0 auto;
        }
         .tag_select{
            border-radius: 3px;
            margin: 5px;
            height: 26px;
            width: 189px;
            border-width: 1px;
            border-style: solid;
            border-color: #e6e6e6;
            padding: 0 48px;
        }
        .tag_body input{
            border-radius: 3px;
            margin: 5px;
            height: 26px;
            width: 189px;
            border-width: 1px;
            border-style: solid;
            border-color: #e6e6e6;
            text-align: center;
        }
        .tag_body button{
            border-radius: 3px;
            margin: 22px 73px;
            padding: 0 0;
            height: 28px;
            width: 65px;
            background-color: #009688;
            color: #fff;
            white-space: nowrap;
            text-align: center;
            cursor: pointer;
            border: none;
            font-size: 12px;
        }
        .tag_body button:hover{
            background-color: #54968a;
        }
        .tag_body{
            height: 392px;
            padding: 21px 35px;
            background: #f1f1f1;
        }
        .tag_content{
            margin-bottom: 2px;
            margin-left: 13px;
        }
        .tag_info{
            position: relative;
            font-size: 12px;
            margin: 0 0;
        }
        .tag_user_input{
            display: inline-block;
            padding: 0 16px;
        }
        .tag_passwd{
            margin: 0 3px;
        }
        .tag_red{
            color: red;
        }
        .tag_passwd{
            margin-left: 14px;
        }
    </style>
</head>
<body>
     <div class="tag_content">
        <div class="tag_body">
            <div class="tag_content">
                <label class="tag_info">
                    <span class="tag_red">*</span>project
                </label>
                <div class="tag_user_input">
                    <label>
                        <select class="tag_select">
                        {% for i in all_platform %}
                            <option name="project" value="{{ i.project }}">{{ i.project }}</option>
                        {% endfor %}
                        </select>
                    </label>
                </div>
            </div>
            <div class="tag_content">
                <label class="tag_info">
                    <span class="tag_red">*</span>desc
                </label>
                <div class="tag_user_input" style="padding: 0 30px">
                    <input type="text" name="desc">
                </div>
            </div>
            <div class="tag_content tag_passwd">
                <button type="button" id="edit_server">提交</button>
            </div>
        </div>
    </div>
</body>
<script src="/static/js/jquery-1.11.1/jquery.min.js"></script>
<script src="/static/js/jquery-1.11.1/js.cookie.min.js"></script>
<script src="/static/js/jquery-1.11.1/jquery-cookies-min.js"></script>
<script type="text/javascript">
    function csrfSafeMethod(method) {
        // these HTTP methods do not require CSRF protection
        return (/^(GET|HEAD|OPTIONS|TRACE)$/.test(method));
    }
    var csrftoken = Cookies.get('csrftoken');
    $.ajaxSetup({
        beforeSend: function(xhr, settings) {
            if (!csrfSafeMethod(settings.type) && !this.crossDomain) {
            xhr.setRequestHeader("X-CSRFToken", csrftoken);
            }
        }
    });
    /*修改服务器信息*/
    $(function () {
        var value = location.search;
        value = value.substr(1).split('&');
        for(var i=0;i<=value.length;i++){
            if(value[i]!=undefined){
                var val = value[i].split('=');
                $('option').each(function () {
                    if($(this).val()==val[1]){
                        $(this).attr('selected','selected');
                    }
                });
                $('input').each(function () {
                    if($(this).attr('name')==val[0]){
                        $(this).val(val[1]);
                    }
                })
            }
        }
        $('#edit_server').click(function () {
            if($("input[name='desc']").val()=='' || $("input[name='desc']").val()==undefined || $("input[name='desc']").val()==null){
                alert('ip不能为空哦.');
                return false;
            }
            var data_list = new Array();
            var project = $("option[name='project']:selected").val();
            data_list.push(project);
            $('input').each(function () {
                data_list.push($(this).val());
            });
            console.log(data_list);
            $.ajax({
                url: '/cmdb/editplas/',
                type: 'post',
                data: {'data': JSON.stringify(data_list)},
                error: function () {
                    console.log('failed.')
                },
                success: function (res) {
                    alert(res['status']);
                }
            })
        })
    });
</script>
</html>
