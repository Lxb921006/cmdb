<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <link rel="stylesheet" href="/static/css/layui-v2.5.4/layui/css/layui.css">
    <link rel="stylesheet" href="/static/css/jquery-ui.css">
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        html{
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }
        body{
            width: 100%;
            min-height: 100%;
            background: #f1f1f1;
        }
        .tag-location{
            position: absolute;
            left: 36%;
            top:9%;
            width: 27%;
            height: 414px;
            border-radius: 13px;
            background-color: #fff;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,.05);
        }
        .tag-control-child>*{
            padding: 10px;
        }
        .tag-sub-location{
            position: relative;
            overflow: hidden;
        }
        .tag-child-content{
            margin: 2px 2px;
        }
        .tag-login{
            position: relative;
            text-align: center;
            padding: 14px 1px;
        }
        .tag-login-title{
            font-size: 37px;
            color: #323640 !important
        }
        .tag-login-info input{
            height: 41px;
            width: 392px;
            border-radius: 28px;
            border: none;
            background-color: #f0f0e9;
            padding: 0 9px;
            outline:none;
        }
        .tag-info-top{
            margin-top: 50px;
        }
        .tag-login-action button{
            height: 38px;
            line-height: 38px;
            width: 107px;
            font-size: 14px;
            color: #fff;
            text-align: center;
            border: none;
            cursor: pointer;
            border-radius: 19px;
            background-color: #0aaaef;
        }
        .tag-public-right{
            float: right;
            margin-right: 41px;
        }
        .tag-login-action button:hover{
            background-color: #0bc7ef;
        }
    </style>
</head>
<body>
    <div class="tag-location tag-control-child">
        <div class="tag-sub-location">
            <div class="tag-child-content">
                <form action="" method="post">
                    <div class="tag-login-title tag-login">
                        <strong>运维平台</strong>
                    </div>
                    <div class="tag-login-info tag-login tag-info-top">
                        <input type="text" id="username" name="username" placeholder="用户名">
                    </div>
                    <div class="tag-login-info tag-login">
                        <input type="text" id="passwd" name="passwd" placeholder="密码">
                    </div>
                    <div class="tag-login-action tag-login tag-public-right">
                        <button type="submit" id="submit">登录</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
<script src="/static/js/jquery-1.11.1/jquery.min.js"></script>
<script src="/static/js/jquery-1.11.1/jquery-ui-min.js"></script>
<script type="text/javascript">
</script>
</html>
