<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>主机添加</title>
    <style>
        body{
            margin: 0;
            padding: 0;
        }
        table{
            width: 82%;
            height: 10%;
            margin-top:5px;
            margin-left:0;
            border-collapse: collapse;
            border: 1px solid #627280;
        }
        tr,th,td{
            height:30px;
            width:6%;
            text-align:center;
            border: 1px solid #EBEBEB;
            font-size: 14px;
        }
        td{
            background-color: white;
        }
        th{
            background-color: ghostwhite;
        }

        .page_info{
            margin-top: 10px;
            margin-left: 50px;
        }
        .page_info span{
            font-size: 14px;
        }
        .page_info span.pages{
            padding: 0 10px;
            vertical-align: top;
            display: inline-block;
            font-size: 14px;
            min-width: 36px;
            min-height: 28px;
            line-height: 28px;
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
            background-color: #ffffff;
            color: #606266;
            border-radius: 6px;
            margin: 0 1px;
            border: 1px solid #ebebeb;
            height: 30px;
        }
        .page_info span.pages:hover { /* 鼠标移入按钮范围时改变颜色 */
	        background: #b5c3ef;
        }
        .page_info span input {
             -webkit-appearance: none;
            background-color: #fff;
            background-image: none;
            border-radius: 4px;
            border: 1px solid #dcdfe6;
            box-sizing: border-box;
            color: #606266;
            display: inline-block;
            font-size: inherit;
            outline: none;
            padding: 3px 5px;
            transition: border-color .2s cubic-bezier(.645,.045,.355,1);
            width: 40px;
            height: 28px;
            margin: 0 6px;
        }
        .page_info span label select{
            -webkit-appearance: none;
            background-color: #fff;
            background-image: none;
            border-radius: 4px;
            border: 1px solid #dcdfe6;
            box-sizing: border-box;
            color: #606266;
            display: inline-block;
            font-size: inherit;
            outline: none;
            padding: 3px 5px;
            transition: border-color .2s cubic-bezier(.645,.045,.355,1);
            width: 42px;
            height: 30px;
            margin: 0 6px;
        }
        .check_record_log_css input{
            -webkit-appearance: none;
            background-color: #fff;
            background-image: none;
            border-radius: 4px;
            border: 1px solid #dcdfe6;
            box-sizing: border-box;
            color: #606266;
            display: inline-block;
            font-size: inherit;
            outline: none;
            padding: 3px 5px;
            transition: border-color .2s cubic-bezier(.645,.045,.355,1);
            width: 170px;
            height: 30px;
            margin: 0 6px;
        }
        .div_add_servers_info{
            width: 1167px;
            height: 102px;
            padding-top: 46px;
            padding-left: 45px;
            margin-left: 31px;
            margin-bottom: 30px;
            border: 2px solid #f5f2f2;
            border-radius:25px;
            -moz-border-radius:25px; /* Old Firefox */
        }
        .div_add_servers_info input{
            -webkit-appearance: none;
            background-color: #fff;
            background-image: none;
            border-radius: 4px;
            border: 1px solid #dcdfe6;
            box-sizing: border-box;
            color: #606266;
            display: inline-block;
            font-size: inherit;
            outline: none;
            padding: 3px 5px;
            transition: border-color .2s cubic-bezier(.645,.045,.355,1);
            width: 170px;
            height: 30px;
            margin: 0 6px;
        }
        .div_button_setting{
            margin-top: 29px;
            margin-left: 43%;
        }
        .div_button_setting button{
            width: 96px; /* 宽度 */
            height: 23px; /* 高度 */
            border-width: 0; /* 边框宽度 */
            border-radius: 3px; /* 边框半径 */
            background: #1E90FF; /* 背景颜色 */
            cursor: pointer; /* 鼠标移入按钮范围时出现手势 */
            outline: none; /* 不显示轮廓线 */
            font-family: Microsoft YaHei; /* 设置字体 */
            color: white; /* 字体颜色 */
            font-size: 13px; /* 字体大小 */
            margin-left: 10px;
        }
        .div_button_setting button:hover{
            background: #5599FF;
        }
        tbody button{
            height: 28px;
            width: 50px;
            cursor: pointer;
            color: whitesmoke;
            background-color: #da4341;
            border-left: 1px solid #bbbbbb;
            border-right: 1px solid #bbbbbb;
            border-top: 1px solid #bbbbbb;
            border-bottom: 1px solid #bbbbbb;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div style="margin-top: 30px;margin-left: 220px">
        <div class="div_add_servers_info">
            <input class="servers_platform" type="text" id="project_input" name="add_servers_platform" placeholder="项目" />
            <input class="servers_platform" type="text" id="ip_input" name="add_servers_platform" placeholder="ip" />
            <input class="servers_platform" type="text" id="ram_input" name="add_servers_platform" placeholder="内存" />
            <input class="servers_platform" type="text" id="cpu_input" name="add_servers_platform" placeholder="cpu" />
            <input class="servers_platform" type="text" id="disk_input" name="add_servers_platform" placeholder="硬盘" />
            <input class="servers_platform" type="text" id="os_input" name="add_servers_platform" placeholder="os" />
            <div class="div_button_setting">
                <button name="add_server" class="login-button" type="submit">添加</button>
            </div>
        </div>
        <div style="margin-left: 50px">
            <div class="check_record_log_css">
                <input type="text" placeholder="请输入关键词" name="search_data"/>
            </div>
            <table>
                <thead>
                    <tr>
                        <th><input type="checkbox" id="select_all">选项</th>
                        <th>项目</th>
                        <th>ip</th>
                        <th>内存</th>
                        <th>cpu</th>
                        <th>硬盘</th>
                        <th>os</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="clears">
                {% for item in data_info %}
                    <tr>
                        <td><input type="checkbox" name="servers" value="{{ item.ip }}"></td>
                        <td class="select_first_td">{{ item.project }}</td>
                        <td>{{ item.ip }}</td>
                        <td>{{ item.ram }}</td>
                        <td>{{ item.cpu }}</td>
                        <td>{{ item.hard_disk }}</td>
                        <td>{{ item.os }}</td>
                        <td><button class="del_servers" style="height:28px;cursor: pointer;" id="{{ item.project }}-{{ item.ip }}">删除</button></td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="page_info">
            <span>
                <label>每页显示
                    <select id="change_page_number" onchange="change_data_number()">
                        <option value="10">10</option>
                        <option value="20">20</option>
                        <option value="30">30</option>
                        <option value="40">40</option>
                    </select>
                </label>
            </span>
            <span class="pages" id="previous">上一页</span>
            <span class="pages" id="next">下一页</span>
            <span>跳转到</span>
            <span><input type="number" name="jump_page"></span>
            <span>页</span>
            <span  id="now_page_number">第1页</span>
            <span id="total_pages">总共{{ total_page }}页</span>
            <span id="all_count">合计{{ total_number }}条</span>
        </div>
    </div>
</body>
<script src="/static/js/jquery-1.11.1/jquery.min.js/"></script>
<script type="text/javascript">
    /*这里是复选框多选*/
    $(function () {
        $("#select_all").click(function(){
            console.log($(this).prop("checked"));
            if($(this).prop("checked")){
                $("input[name='servers']").prop("checked",true);
            }else{
                $("input[name='servers']").prop("checked",false);
            }
        });
    });

    /*这里是删除服务器*/
    $(function () {
        $(document).on("click", ".del_servers", function (){
            console.log($(this).attr('id'));
            $.ajax({
                url:'/cmdb/del_servers/',
                type:'post',
                data:{'del_data':$(this).attr('id')},
                error:function () {
                    alert('failure.');
                },
                success:function (res) {
                    alert(res['status']);
                }
            })
        })
    });

    /*点击表格任意行自动填充*/
    $(function () {
        $(document).on('click','.select_first_td',function () {
            var project =  $(this).text();
            var ip = $(this).siblings("td:eq(1)").text();
            var arm = $(this).siblings("td:eq(2)").text();
            var cpu = $(this).siblings("td:eq(3)").text();
            var disk = $(this).siblings("td:eq(4)").text();
            var os = $(this).siblings("td:eq(5)").text();
            $("#project_input").val(project);
            $("#ip_input").val(ip);
            $("#ram_input").val(arm);
            $("#cpu_input").val(cpu);
            $("#disk_input").val(disk);
            $("#os_input").val(os);
        })
    });

     /*这里是添加服务器*/
        $(function(){
            $("button[name='add_server']").click(function () {
                var data_list = new Array();
                $("input[name='add_servers_platform']").each(function () {
                    if ($(this).val()) {
                        data_list.push($(this).val());
                    }
                });
                if(data_list.length!=6){
                    alert('必须全部填写');
                    return false;
                }
                else {
                    $.ajax({
                    url:'/cmdb/create_servers/',
                    type:'post',
                    data:{'data': JSON.stringify(data_list)},
                    error: function () {
                        alert('add server fail.');
                    },
                    success: function (res) {
                        alert(res['status']);
                        }
                    })
                }
            });
        });

    page_number = 1; /*这里只能是要设置一个全局变量,因为以下函数都需要用到,这个变量非常重要*/
    function change_data_number() {
        $.ajax({
            url:'/cmdb/search_add_servers/',
            type:'post',
            data:{
                    'cur_page': 1,
                    'change_page_number':$("#change_page_number").val(),
                    'jump_page':$("input[name='jump_page']").val(),
                    'search_data':$("input[name='search_data']").val(),
                },
            error:function () {
                console.log('失败');
            },
            success:function (data) {
                page_number = 1;
                var cleardatas = "";
                for(var i=0;i<data['data_info'].length;i++){
                    var alldatas = data['data_info'][i];
                    cleardatas += '<tr>';
                    cleardatas += '<td>'+'<input type="checkbox"  name="servers" value='+alldatas['ip']+'>'+'</td>';
                    cleardatas += '<td class="select_first_td">'+alldatas['project']+'</td>';
                    cleardatas += '<td>'+alldatas['ip']+'</td>';
                    cleardatas += '<td>'+alldatas['ram']+'</td>';
                    cleardatas += '<td>'+alldatas['cpu']+'</td>';
                    cleardatas += '<td>'+alldatas['hard_disk']+'</td>';
                    cleardatas += '<td>'+alldatas['os']+'</td>';
                    cleardatas += '<td>'+ '<button class="del_servers" style="height:28px;cursor: pointer;" id='+alldatas['project']+'-'+alldatas['ip']+'>删除</button>' +'</td>';
                    cleardatas += '</tr>';
                }
                $("#clears").empty().html(cleardatas);
                $("#total_pages").empty().html('总共'+data['total_pages']+'页');
                $("#now_page_number").empty().html('第'+page_number+'页');
                $("#all_count").empty().html('合计'+data['total_number']+'条');
            }
        })
    }

    /*这里就是牛皮的翻页了*/
    $(function () {
        $('span').on('click', function () {
            if($(this).attr('id')=='previous'){
                page_number --;
                if(page_number>0){
                    console.log('one'+page_number);
                    turn_page();
                }
                else{
                    page_number = 1;
                    console.log('two'+page_number);
                    alert('别点了,翻完了.');
                }
            }
            else if($(this).attr('id')=='next'){
                page_number ++;
                console.log('three'+page_number);
                turn_page();
            }
        })
    });

    /*这里是翻页的核心函数*/
    function turn_page() {
        $.ajax({
                url:'/cmdb/search_add_servers/',
                type:'post',
                data:{
                    'cur_page': page_number,
                    'change_page_number':$("#change_page_number").val(),
                    'jump_page':'',
                    'search_data':$("input[name='search_data']").val(),
                },
                error:function () {
                    console.log('失败');
                },
                success:function (data) {
                //    console.log('总页数'+data['total_pages']);
                    if(data['total_pages'] == 1 && page_number>data['total_pages']){
                        page_number = data['total_pages'];
                        alert('别点了,翻完了.');
                        return false;
                    }
                    else if(page_number>data['total_pages'] && data['total_pages'] != 1){
                //        console.log('four'+page_number);
                        page_number = data['total_pages'];
                        alert('别点了,翻完了.');
                        return false;
                    }
                    var cleardatas = "";
                    for(var i=0;i<data['data_info'].length;i++){
                        var alldatas = data['data_info'][i];
                        cleardatas += '<tr>';
                        cleardatas += '<td>'+'<input type="checkbox"  name="servers" value='+alldatas['ip']+'>'+'</td>';
                        cleardatas += '<td class="select_first_td">'+alldatas['project']+'</td>';
                        cleardatas += '<td>'+alldatas['ip']+'</td>';
                        cleardatas += '<td>'+alldatas['ram']+'</td>';
                        cleardatas += '<td>'+alldatas['cpu']+'</td>';
                        cleardatas += '<td>'+alldatas['hard_disk']+'</td>';
                        cleardatas += '<td>'+alldatas['os']+'</td>';
                        cleardatas += '<td>'+ '<button class="del_servers" style="height:28px;cursor: pointer;" id='+alldatas['project']+'-'+alldatas['ip']+'>删除</button>' +'</td>';
                        cleardatas += '</tr>';
                    }
                    $("#clears").empty().html(cleardatas);
                    $("#total_pages").empty().html('总共'+data['total_pages']+'页');
                    $("#now_page_number").empty().html('第'+page_number+'页');
                    $("#all_count").empty().html('合计'+data['total_number']+'条');
                }
            })
        }

        /*这里是提交页码*/
        $($("input[name='jump_page']")).keypress(function (e) {
            if(e.which == "13")
                if($(this).val()){
                    search_page($(this).val());
                }
                else{
                    alert('请输入页码.');
                }
        });

        /*这里是提交页码后台返回的数据展示*/
        function search_page(page) {
            $.ajax({
                url:'/cmdb/search_add_servers/',
                type:'post',
                data:{
                    'cur_page': '',
                    'change_page_number':$("#change_page_number").val(),
                    'jump_page':$("input[name='jump_page']").val(),
                    'search_data':$("input[name='search_data']").val(),
                },
                error:function () {
                    console.log('失败.')
                },
                success:function (data) {
                    if($("input[name='jump_page']").val()>data['total_pages']){
                        alert('好好看,哪有这么多页.');
                        return false;
                    }
                    page_number = page;
                    var cleardatas = "";
                    for(var i=0;i<data['data_info'].length;i++){
                        var alldatas = data['data_info'][i];
                        cleardatas += '<tr>';
                        cleardatas += '<td>'+'<input type="checkbox"  name="servers" value='+alldatas['ip']+'>'+'</td>';
                        cleardatas += '<td class="select_first_td">'+alldatas['project']+'</td>';
                        cleardatas += '<td>'+alldatas['ip']+'</td>';
                        cleardatas += '<td>'+alldatas['ram']+'</td>';
                        cleardatas += '<td>'+alldatas['cpu']+'</td>';
                        cleardatas += '<td>'+alldatas['hard_disk']+'</td>';
                        cleardatas += '<td>'+alldatas['os']+'</td>';
                        cleardatas += '<td>'+ '<button class="del_servers" style="height:28px;cursor: pointer;" id='+alldatas['project']+'-'+alldatas['ip']+'>删除</button>' +'</td>';
                        cleardatas += '</tr>';
                    }
                    $("#clears").empty().html(cleardatas);
                    $("#total_pages").empty().html('总共'+data['total_pages']+'页');
                    $("#now_page_number").empty().html('第'+page+'页');
                    $("#all_count").empty().html('合计'+data['total_number']+'条');
                }
            })
        }

        /*实时的检测指定input框值的变化*/
        $("input[name='search_data']").on('input propertychange', function () {
            page_number = 1;
            turn_page();
        });

        /*鼠标悬停在tr整行变色*/
        $(function () {
            $(document).on('mouseenter','td',function () {
                $(this).css('background-color','#F6FAFF');
                $(this).siblings('td').css('background-color','#F6FAFF');
            });
            $(document).on('mouseleave','td',function(){
                $(this).css('background-color','white');
                $(this).siblings('td').css('background-color','white');
            });
        })
    </script>
</html>
