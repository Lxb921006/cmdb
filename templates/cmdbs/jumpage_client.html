<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title id="contents"></title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
         html{
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }
        body{
            width: 100%;
            min-height: 100%;
            background: #f1f1f1;
        }
        .tag_public{
            position: relative;
            width: 100%;
            box-sizing: border-box;
        }
        .tag_outside{
            padding: 18px;
        }
        .tag_body{
            background-color: #fff;
        }
        .tag_action_title{
            height: 60px;
            border-width: 0 0 1px 0;
            border-style: solid;
            border-color: #e6e6e6;
            font-size: 18px;
            padding: 14px 0;
        }
        .tag_title_content{
            padding: 1px 20px;
        }
        .tag_action_content{
            height: 100%;
            font-size: 12px;
            padding: 12px 20px;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,.05);
        }
    </style>
</head>
<body>
    <div class="tag_public tag_outside">
        <div class="tag_public tag_body">
            <div class="tag_public tag_action_title">
                <p class="tag_title_content" id="content"></p>
            </div>
            <div class="tag_public tag_action_content" id="output_content"></div>
        </div>
    </div>
</body>
    <script src="/static/js/jquery-1.11.1/jquery.min.js"></script>
    <script type="text/javascript">
        $(function(){
            var value = location.search;
            value = value.substr(1).split("&");
            var project = value[0].split('=')[1];
            var ipaname = value[1].split('=')[1];
            $('#content').html('project:'+project+',pushing package.');
            var socket = new WebSocket("ws://118.25.185.60/cmdb/client_update/");
            console.log(socket);
            socket.onopen = function(){
                console.log('already connect websocket');//已连接上Websocket
                socket.send(project+"-"+ipaname);//发送数据到服务端
            };
            socket.onmessage = function(e){
                console.log( $('#output_content').height() , 'message: ' + e.data);//输出服务端返回的数据
                $('#output_content').append(e.data+'<br/>');
                window.scrollTo(0, document.documentElement.clientHeight);
            };
        });
    </script>
</html>
